<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha de Ponto CLT - Nuvem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <h1>🔐 Acesso Restrito</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Entre para acessar o sistema</p>
        <div class="login-form">
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-password" placeholder="Senha">
            <button class="btn btn-primary" onclick="window.handleLogin()">Entrar</button>
        </div>
        <p id="login-error" style="color: var(--danger); margin-top: 10px; font-size: 0.9rem;"></p>
    </div>

    <div class="container" id="app-container">
        
        <div class="top-bar">
            <h1>Folha de Ponto CLT</h1>
            <div class="top-bar-actions">
                <button class="theme-toggle" onclick="window.toggleTheme()" id="theme-icon">🌓</button>
                <button class="btn btn-danger btn-sm" onclick="window.handleLogout()">Sair</button>
            </div>
        </div>

        <div class="tabs">
            <button id="btn-week" class="tab-btn active" onclick="window.setMode('week')">Semana</button>
            <button id="btn-month" class="tab-btn" onclick="window.setMode('month')">Mês</button>
            <button id="btn-config" class="tab-btn" onclick="window.setMode('config')">⚙️ Funcionários</button>
        </div>

        <div id="view-config" style="display: none;">
            <div class="config-card">
                <h3 style="margin-bottom: 15px;">Cadastrar Novo Funcionário</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-employee-name" placeholder="Nome completo do funcionário">
                    <button class="btn btn-primary" onclick="window.addEmployee()">Cadastrar</button>
                </div>
                <p id="config-msg" style="color: var(--success); margin-top: 10px; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div id="view-ponto">
            <div class="controls-card">
                <div class="controls-grid">
                    <div class="control-group" style="flex: 2;">
                        <label>Funcionário</label>
                        <select id="employee-select" onchange="window.loadEmployeeData()">
                            <option value="">-- Selecione um funcionário --</option>
                        </select>
                    </div>
                    <div class="control-group" id="week-control">
                        <label>Semana</label>
                        <input type="week" id="week-input" onchange="window.renderTable()">
                    </div>
                    <div class="control-group" id="month-control" style="display: none;">
                        <label>Mês</label>
                        <input type="month" id="month-input" onchange="window.renderTable()">
                    </div>
                    <div class="control-group">
                        <label>Carga Base</label>
                        <input type="number" id="base-hours" value="44" onchange="window.updateSummary()">
                    </div>
                    <div class="control-group">
                        <label>Jornada Diária</label>
                        <input type="time" id="jornada-diaria" value="08:00" onchange="window.renderTable()">
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data / Dia</th><th>Entrada</th><th>Saída Almoço</th><th>Retorno</th><th>Saída Final</th><th>Feriado/Atestado</th><th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="summary-card">
                <div class="summary-item">
                    <h3 style="font-size: 0.8rem; color: var(--text-muted);">Total (Trabalho+Abono)</h3>
                    <div class="value" id="total-trabalhado">00:00</div>
                </div>
                <div class="summary-item">
                    <h3 style="font-size: 0.8rem; color: var(--text-muted);">Saldo (Banco)</h3>
                    <div class="value" id="saldo-final">00:00</div>
                </div>
                <div class="summary-item">
                    <h3 style="font-size: 0.8rem; color: var(--text-muted);">Extras 100%</h3>
                    <div class="value info-color" id="horas-100">00:00</div>
                </div>
            </div>

            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="btn btn-danger" onclick="window.clearData()">Limpar Tudo</button>
                <input type="file" id="csv-import-hidden" accept=".csv" onchange="window.handleCSVImport(this)" style="display:none">
                <button class="btn btn-info" onclick="document.getElementById('csv-import-hidden').click()">Importar CSV</button>
                <button class="btn btn-success" onclick="window.exportCSV()">Exportar CSV</button>
                <button class="btn btn-primary" onclick="window.print()">Salvar PDF / Imprimir</button>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
